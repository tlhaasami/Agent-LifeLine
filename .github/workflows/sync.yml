name: Sync to QuickHolidays

on:
  push:
    branches:
      - main

jobs:
  git-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      
      - name: Push to QuickHolidays
        env:
          TARGET_TOKEN: ${{ secrets.QUICKHOLIDAYS_PAT }}
        run: |
          # Set up git user identity inside runner workspace
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Create a temp branch to commit the deletion of .github
          git checkout -b temp-sync-branch
          
          # Remove .github folder from git tracking in the temp branch
          git rm -rf .github
          git commit -m "chore: sync code to quickholidays without workflows"
          
          # Remove any leftover authorization headers from checkout to prevent 403 blocks
          git config --local --unset-all "http.https://github.com/.extraheader" || true
          
          # Configure remote target with secret token and push temp-sync-branch to remote main
          git remote add target "https://quickholidays:${TARGET_TOKEN}@github.com/quickholidays/Agent-LifeLine.git"
          git push target temp-sync-branch:main --force
